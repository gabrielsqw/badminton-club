version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: badminton-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: badminton
      POSTGRES_PASSWORD: badminton_secret
      POSTGRES_DB: badminton_club
    ports:
     - "5433:5432"
    volumes:
     - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U badminton -d badminton_club"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: badminton-app
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://badminton:badminton_secret@db:5432/badminton_club
      SECRET_KEY: cinquante-dix-coq
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./badminton_club:/app/badminton_club:ro
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: badminton-api
    environment:
      DATABASE_URL: postgresql://badminton:badminton_secret@db:5432/badminton_club
      API_KEY: ${API_KEY:-badminton-internal-key}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  openclaw:
    build:
      context: .
      dockerfile: Dockerfile.openclaw
    container_name: badminton-openclaw
    ports:
      - "18790:18789"
      - "1455:1455"
    volumes:
      - ./openclaw/config:/root/.openclaw
      - ./openclaw/workspace/skills:/root/.openclaw/workspace/skills
    environment:
      BADMINTON_API_URL: http://api:8001/api
      API_KEY: ${API_KEY:-badminton-internal-key}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:
